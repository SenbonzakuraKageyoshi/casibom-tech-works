<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="google" content="nopagereadaloud" />
    <title>Casibom error</title>

    <meta name="theme-color" content="#212121" />
    <meta name="msapplication-config" content="/static/images/favicons/browserconfig.xml" />

    <style>
        :root {
            --base-color: #fff;
            --text-color: #ADADAD;
            --border-color: #575757;
            --icon-color: #575757;
            --background-color: #212121;
            --background-lines-color: #2c2c2c;
        }

        * {
            box-sizing: border-box
        }

        body {
            background:
                linear-gradient(45deg,
                    var(--background-lines-color) 0,
                    var(--background-lines-color) 1%,
                    transparent 1%,
                    transparent 49%,
                    var(--background-lines-color) 49%,
                    var(--background-lines-color) 51%,
                    transparent 51%,
                    rgba(50, 50, 50, 0) 99%,
                    var(--background-lines-color) 99%,
                    var(--background-lines-color) 100%),
                var(--background-color);
            background-size: 8px 8px;
            background-position: 50% 50%;
            text-align: center;
            font-family: Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            margin: 0;
            min-height: 100dvh;
            display: flex;
            align-items: center;
        }

        .container {
            max-width: 73.125rem;
            margin: auto;
            padding: 2rem 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem
        }

        .column {
            flex: 1 1 100%
        }

        .column-6 {
            flex: 1 1 28rem;
            padding: 1rem;
            display: flex;
            align-items: center;
            flex-direction: column;
            justify-content: center
        }

        .column--main {
            margin-bottom: .5rem;
            padding-top: .5rem
        }

        .column--tech_info {
            padding-top: 1rem;
            font-size: .875rem;
            opacity: .9
        }

        h1 {
            color: var(--base-color);
            font-size: 1.5rem;
            margin: 0 0 1rem
        }

        p {
            font-size: 1.05rem;
            color: var(--text-color);
            font-weight: 500;
            margin: .25rem 0
        }

        a {
            color: var(--text-color)
        }

        p strong {
            font-size: 1.125rem;
            font-weight: 800;
            color: var(--base-color)
        }

        .logo {
            max-height: 10rem
        }

        .panel {
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            padding: 1.25rem;
            background: rgba(255, 255, 255, 0.02)
        }

        .muted {
            font-size: .9rem;
            opacity: .95
        }

        .ip {
            margin-top: .5rem
        }

        .lang-toggle {
            position: fixed;
            top: .75rem;
            right: .75rem;
            font-size: .825rem;
            opacity: .7
        }

        .lang-toggle a {
            margin-left: .5rem;
            text-decoration: none
        }

        @media (max-width: 767px) {
            .logo {
                max-height: 3.25rem
            }

            h1 {
                font-size: 1.25rem
            }

            p {
                font-size: .95rem
            }
        }

        .link {
            text-decoration: none;
            width: 200px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            margin-top: 20px;
            background: #ff0123;
            color: #fff;
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>

<body>
    <div class="container" role="main">
        <div class="column column--main">
            <p><img src="./Casibom.jpg" class="logo" alt="Logo" /></p>
            <h1 id="h-title" data-i18n="title">Sitedeki hata</h1>
            <p id="p-reason" class="muted" style="max-width:28.125rem;margin:auto" data-i18n="reason">
                Web sitesi üzerinde teknik çalışmalar yürütüyoruz.
            </p>
        </div>

        <div class="column-6">
            <div class="panel">
                <p style="margin:0;"><strong id="h-not-restricted" data-i18n="notRestrictedTitle">Gerçekten oynamak
                        istiyorum ama site hala yüklenmedi?</strong></p>
                <p id="p-vpn" style="max-width:20rem;margin:.25rem auto" data-i18n="vpnHint">
                    Pinco'daki ortaklarımızı ziyaret etmenizi öneririz, onlar da çok eğleniyorlar!
                </p>
                <a href="" class="link">Pinco giriş</a>
            </div>
        </div>
    </div>
</body>

</html>
